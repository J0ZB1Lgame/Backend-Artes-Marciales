<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combates — Budokai System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Orbitron', sans-serif; overflow: hidden; background: #000; color: white; }

        .video-bg { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: -2; }
        .video-overlay { position: fixed; inset: 0; background: linear-gradient(90deg, rgba(0,0,0,.90) 0%, rgba(0,0,0,.58) 45%, rgba(0,0,0,.22) 100%); z-index: -1; }

        .layout { width: 100%; height: 100vh; display: flex; }

        /* CONTENIDO */
        .combat-section { flex: 1; padding: 40px; overflow: auto; }
        .combat-header  { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .combat-title   { font-size: 52px; font-weight: 900; letter-spacing: .05em; text-transform: uppercase; text-shadow: 0 0 24px rgba(255,60,60,.22); }
        .combat-sub     { margin-top: 10px; font-size: 14px; color: rgba(255,255,255,.72); }

        .top-actions { display: flex; gap: 16px; }
        .create-btn, .panel-btn {
            height: 58px; padding: 0 28px; border: none; border-radius: 18px; cursor: pointer;
            font-family: inherit; font-size: 13px; font-weight: 900; letter-spacing: .10em; text-transform: uppercase;
        }
        .create-btn { color: white; background: linear-gradient(90deg, #ff3b30, #ff6b45); box-shadow: 0 0 24px rgba(255,70,70,.25); }
        .panel-btn  { color: white; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.08); }

        /* STATS */
        .stats-bar { display: flex; gap: 14px; margin-bottom: 18px; flex-wrap: wrap; }
        .stat-pill {
            padding: 10px 18px; border-radius: 14px;
            background: rgba(18,10,10,.82); border: 1px solid rgba(255,60,60,.18);
            font-size: 11px; letter-spacing: .10em; text-transform: uppercase; color: rgba(255,255,255,.72);
        }
        .stat-pill span { font-size: 18px; font-weight: 900; color: #ff6b45; display: block; }

        /* GRID DE CARDS */
        .combat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 24px; }

        /* CARD */
        .combat-card {
            border-radius: 28px; overflow: hidden;
            background: linear-gradient(180deg, rgba(18,10,10,.90), rgba(12,5,5,.96));
            border: 1px solid rgba(255,255,255,.08); backdrop-filter: blur(18px); transition: .22s ease;
        }
        .combat-card:hover { transform: translateY(-6px); border-color: rgba(255,80,80,.25); box-shadow: 0 0 28px rgba(255,60,60,.12); }

        .combat-top { padding: 26px; background: linear-gradient(90deg, rgba(255,60,60,.22), rgba(255,120,80,.10)); }
        .combat-date { font-size: 11px; color: rgba(255,255,255,.55); margin-bottom: 14px; }
        .combat-status {
            display: inline-flex; padding: 6px 12px; border-radius: 999px;
            background: rgba(255,60,60,.15); border: 1px solid rgba(255,60,60,.22);
            font-size: 10px; font-weight: 900; letter-spacing: .12em; text-transform: uppercase; color: #ff6b45;
            margin-bottom: 16px;
        }
        .vs-container { display: flex; align-items: center; justify-content: space-between; }
        .fighter { width: 120px; text-align: center; }
        .fighter.winner .fighter-avatar { box-shadow: 0 0 20px rgba(255,215,0,.6); }
        .fighter-avatar {
            width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; margin: auto; font-size: 36px;
            background: linear-gradient(180deg, #ff3b30, #ff8845);
        }
        .fighter-name { margin-top: 12px; font-size: 13px; font-weight: 700; }
        .fighter-info { font-size: 10px; color: rgba(255,255,255,.55); margin-top: 4px; }
        .vs-text  { font-size: 34px; font-weight: 900; color: #ff6b45; text-shadow: 0 0 20px rgba(255,60,60,.35); }

        .combat-bottom { padding: 14px 26px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: rgba(255,255,255,.6); }
        .combat-actions { display: flex; gap: 8px; padding: 0 26px 20px; }

        /* BADGES */
        .badge { display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 9px; font-weight: 900; letter-spacing: .10em; }
        .badge-pendiente  { background: rgba(255,200,0,.18); color: #ffd700; border: 1px solid rgba(255,200,0,.25); }
        .badge-en-curso   { background: rgba(255,60,60,.18);  color: #ff6b45; border: 1px solid rgba(255,60,60,.25); }
        .badge-finalizado { background: rgba(0,220,120,.18);  color: #00dc78; border: 1px solid rgba(0,220,120,.25); }
        .badge-pesado     { background: rgba(255,80,80,.18);  color: #ff8080; border: 1px solid rgba(255,80,80,.25); }
        .badge-medio      { background: rgba(255,200,0,.18);  color: #ffd700; border: 1px solid rgba(255,200,0,.25); }
        .badge-ligero     { background: rgba(0,220,120,.18);  color: #00dc78; border: 1px solid rgba(0,220,120,.25); }
        .badge-pluma      { background: rgba(180,100,255,.18);color: #b464ff; border: 1px solid rgba(180,100,255,.25); }
        .badge-default    { background: rgba(255,255,255,.08); color: rgba(255,255,255,.6); }

        .btn-edit, .btn-delete {
            height: 32px; padding: 0 14px; border: none; border-radius: 8px; cursor: pointer;
            font-family: inherit; font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
        }
        .btn-edit   { background: rgba(255,107,69,.14); color: #ff6b45; border: 1px solid rgba(255,107,69,.20); }
        .btn-edit:hover   { background: rgba(255,107,69,.28); }
        .btn-delete { background: rgba(255,80,80,.14);  color: #ff6060; border: 1px solid rgba(255,80,80,.20); }
        .btn-delete:hover { background: rgba(255,80,80,.28); }

        #loading { display: none; text-align: center; padding: 40px; font-size: 13px; color: rgba(255,255,255,.55); }
        #no-data  { display: none; text-align: center; padding: 40px; font-size: 13px; color: rgba(255,255,255,.45); }

        /* PANEL LATERAL */
        .side-panel {
            width: 360px; height: 100vh;
            background: linear-gradient(180deg, rgba(20,8,8,.96), rgba(8,3,3,.98));
            border-left: 1px solid rgba(255,70,70,.18); backdrop-filter: blur(18px);
            padding: 30px 24px; display: flex; flex-direction: column;
            position: fixed; top: 0; right: 0; z-index: 50;
            transform: translateX(110%); transition: .35s ease;
        }
        .side-panel.active { transform: translateX(0); }
        .panel-title { font-size: 28px; font-weight: 900; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 8px; }
        .panel-sub   { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: #ff6b45; margin-bottom: 30px; }
        .panel-menu  { display: flex; flex-direction: column; gap: 14px; flex: 1; min-height: 0; overflow-y: auto; padding-right: 4px; }
        .menu-btn {
            width: 100%; height: 58px; border: none; border-radius: 16px;
            display: flex; align-items: center; gap: 14px; padding: 0 18px;
            cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 700;
            letter-spacing: .08em; text-transform: uppercase; color: white;
            background: linear-gradient(90deg, rgba(45,12,12,.95), rgba(68,20,20,.92));
            border: 1px solid rgba(255,255,255,.05); transition: .22s ease;
        }
        .menu-btn:hover { transform: translateX(-4px); border-color: rgba(255,70,70,.25); box-shadow: 0 0 18px rgba(255,70,70,.14); }
        .menu-btn.active { background: linear-gradient(90deg, #ff3b30, #ff6b45); }
        .menu-icon { font-size: 22px; }
        .close-panel-btn {
            margin-top: auto; height: 56px; border: none; border-radius: 18px; cursor: pointer;
            font-family: inherit; font-size: 13px; font-weight: 900; letter-spacing: .10em;
            text-transform: uppercase; color: white; background: linear-gradient(90deg, #00E5FF, #00B8FF);
        }

        /* MODAL */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,.82);
            display: none; align-items: center; justify-content: center; z-index: 999;
        }
        .modal.open { display: flex; }
        .modal-box {
            width: 580px; max-width: 94vw; border-radius: 28px;
            background: linear-gradient(180deg, rgba(20,8,8,.96), rgba(8,3,3,.98));
            border: 1px solid rgba(255,70,70,.18); padding: 32px; max-height: 90vh; overflow-y: auto;
        }
        .modal-title { font-size: 22px; font-weight: 900; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 24px; }
        .form-grid  { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group.full { grid-column: 1/3; }
        label { font-size: 10px; letter-spacing: .10em; text-transform: uppercase; color: #ff6b45; }
        input, select, textarea {
            width: 100%; height: 48px; border: none; outline: none; border-radius: 12px;
            padding: 0 14px; font-family: inherit; font-size: 12px;
            background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.08); color: white;
        }
        textarea { height: 80px; padding: 12px 14px; resize: none; }
        select option { background: #140808; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 22px; }
        .cancel-btn, .save-btn {
            height: 50px; padding: 0 26px; border: none; border-radius: 12px; cursor: pointer;
            font-family: inherit; font-weight: 900; letter-spacing: .10em; text-transform: uppercase;
        }
        .cancel-btn { background: rgba(255,255,255,.08); color: white; }
        .save-btn   { color: white; background: linear-gradient(90deg, #ff3b30, #ff6b45); }

        /* MEDIA BOX (pendiente img / en-curso video) */
        .card-media {
            width: 100%; height: 130px; overflow: hidden; border-radius: 28px 28px 0 0;
            position: relative; background: #000;
        }
        .card-media img  { width: 100%; height: 100%; object-fit: cover; display: block; }
        .card-media video { width: 100%; height: 100%; object-fit: cover; display: block; }

        /* TOAST */
        .toast {
            position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px);
            background: rgba(20,8,8,.96); border-radius: 14px; padding: 14px 24px;
            font-size: 13px; font-weight: 700; letter-spacing: .06em;
            border: 1px solid rgba(255,70,70,.20); z-index: 2000;
            transition: transform .3s ease, opacity .3s ease; opacity: 0;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast--ok  { border-color: rgba(0,220,120,.30); color: #00dc78; }
        .toast--err { border-color: rgba(255,80,80,.30);  color: #ff8080; }
    </style>
</head>
<body>

<video class="video-bg" autoplay muted loop playsinline>
    <source src="../assets/bg/combates.mp4" type="video/mp4">
</video>
<div class="video-overlay"></div>

<div class="layout">
    <section class="combat-section">

        <!-- CABECERA -->
        <div class="combat-header">
            <div>
                <h1 class="combat-title">COMBATES</h1>
                <div class="combat-sub">Gestión de enfrentamientos del torneo</div>
            </div>
            <div class="top-actions">
                <button class="panel-btn" id="togglePanel">☰ PANEL COMBATES</button>
                <button class="create-btn" id="openModal">+ Crear Combate</button>
            </div>
        </div>

        <!-- STATS -->
        <div class="stats-bar">
            <div class="stat-pill"><span id="stat-total">0</span>Total</div>
            <div class="stat-pill"><span id="stat-pendientes">0</span>Pendientes</div>
            <div class="stat-pill"><span id="stat-en-curso">0</span>En Curso</div>
            <div class="stat-pill"><span id="stat-finalizados">0</span>Finalizados</div>
        </div>

        <!-- GRID -->
        <div class="combat-grid" id="combatGrid"></div>
        <div id="loading">Cargando combates...</div>
        <div id="no-data">No hay combates registrados.</div>

    </section>

    <!-- PANEL LATERAL -->
    <aside class="side-panel" id="combatPanel">
        <div class="panel-title">COMBATES</div>
        <div class="panel-sub">Budokai Tournament System</div>
        <div class="panel-menu">
            <button class="menu-btn" onclick="window.location.href='index.html'"><span class="menu-icon">🏠</span>Inicio</button>
            <button class="menu-btn" onclick="window.location.href='staff.html'"><span class="menu-icon">👥</span>Staff</button>
            <button class="menu-btn" onclick="window.location.href='luchadores.html'"><span class="menu-icon">⚔️</span>Luchadores</button>
            <button class="menu-btn active"><span class="menu-icon">🥊</span>Combates</button>
            <button class="menu-btn" onclick="document.getElementById('openModal').click()"><span class="menu-icon">➕</span>Crear Combate</button>
            <button class="menu-btn" onclick="window.location.href='torneo.html'"><span class="menu-icon">🏆</span>Torneos</button>
            <button class="menu-btn" onclick="window.location.href='estadisticas.html'"><span class="menu-icon">📊</span>Estadísticas</button>
            <button class="menu-btn" onclick="window.location.href='sistema.html'"><span class="menu-icon">⚙️</span>Sistema</button>
            <button class="menu-btn" onclick="cerrarSesion()"><span class="menu-icon">🚪</span>Cerrar Sesión</button>
        </div>
        <button class="close-panel-btn" id="closePanel">✕ Cerrar Panel</button>
    </aside>
</div>

<!-- MODAL CREAR / EDITAR COMBATE -->
<div class="modal" id="modal">
    <div class="modal-box">
        <div class="modal-title" id="modal-title">Crear Combate</div>
        <form id="form-combate">
            <div class="form-grid">
                <div class="form-group full">
                    <label>Torneo *</label>
                    <select id="f-torneo" required>
                        <option value="">Seleccionar torneo...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Luchador 1 (Rojo)</label>
                    <select id="f-luchador-rojo" required>
                        <option value="">Seleccionar luchador...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Luchador 2 (Azul)</label>
                    <select id="f-luchador-azul" required>
                        <option value="">Seleccionar luchador...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Ganador (opcional)</label>
                    <select id="f-ganador">
                        <option value="">Sin ganador aún</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Fecha del Combate</label>
                    <input type="date" id="f-fecha">
                </div>
                <div class="form-group">
                    <label>Estado</label>
                    <select id="f-estado">
                        <option value="pendiente">Pendiente</option>
                        <option value="en curso">En Curso</option>
                        <option value="finalizado">Finalizado</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Arena</label>
                    <input type="text" id="f-arena" placeholder="Ej: Arena Central">
                </div>
                <div class="form-group">
                    <label>Ronda</label>
                    <input type="text" id="f-ronda" placeholder="Ej: Semifinal">
                </div>
                <div class="form-group full">
                    <label>Observaciones</label>
                    <textarea id="f-observaciones" placeholder="Notas adicionales..."></textarea>
                </div>
            </div>
            <div class="modal-actions">
                <button type="button" class="cancel-btn" id="closeModal">Cancelar</button>
                <button type="submit" class="save-btn" id="btn-submit">Crear</button>
            </div>
        </form>
    </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- JS -->
<script src="../js/api.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/modules/combates.js"></script>
<script>
    const panel = document.getElementById('combatPanel');
    document.getElementById('togglePanel').onclick = () => panel.classList.add('active');
    document.getElementById('closePanel').onclick   = () => panel.classList.remove('active');

    function cerrarSesion() {
        if (confirm('¿Deseas cerrar sesión?')) {
            sessionStorage.removeItem('budokai_session');
            window.location.href = 'login.html';
        }
    }
</script>
</body>
</html>
