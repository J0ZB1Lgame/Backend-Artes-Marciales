<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Combates — Budokai System</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            background: #000;
            color: white;
        }
        /* VIDEO */
        
        .video-bg {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }
        
        .video-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient( 90deg, rgba(0, 0, 0, .90) 0%, rgba(0, 0, 0, .58) 45%, rgba(0, 0, 0, .22) 100%);
            z-index: -1;
        }
        /* LAYOUT */
        
        .layout {
            width: 100%;
            height: 100vh;
            display: flex;
        }
        /* CONTENIDO */
        
        .combat-section {
            flex: 1;
            padding: 40px;
            overflow: auto;
        }
        
        .combat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
        }
        
        .combat-title {
            font-size: 52px;
            font-weight: 900;
            letter-spacing: .05em;
            text-transform: uppercase;
            text-shadow: 0 0 24px rgba(255, 60, 60, .22);
        }
        
        .combat-sub {
            margin-top: 10px;
            font-size: 14px;
            color: rgba(255, 255, 255, .72);
        }
        /* BOTONES */
        
        .top-actions {
            display: flex;
            gap: 16px;
        }
        
        .create-btn,
        .panel-btn {
            height: 58px;
            padding: 0 28px;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            font-weight: 900;
            letter-spacing: .10em;
            text-transform: uppercase;
        }
        
        .create-btn {
            color: white;
            background: linear-gradient( 90deg, #ff3b30, #ff6b45);
            box-shadow: 0 0 24px rgba(255, 70, 70, .25);
        }
        
        .panel-btn {
            color: white;
            background: rgba(255, 255, 255, .08);
            border: 1px solid rgba(255, 255, 255, .08);
        }
        /* GRID */
        
        .combat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 24px;
        }
        /* CARD */
        
        .combat-card {
            border-radius: 28px;
            overflow: hidden;
            background: linear-gradient( 180deg, rgba(18, 10, 10, .90), rgba(12, 5, 5, .96));
            border: 1px solid rgba(255, 255, 255, .08);
            backdrop-filter: blur(18px);
            transition: .22s ease;
        }
        
        .combat-card:hover {
            transform: translateY(-6px);
            border-color: rgba(255, 80, 80, .25);
            box-shadow: 0 0 28px rgba(255, 60, 60, .12);
        }
        /* TOP */
        
        .combat-top {
            padding: 26px;
            background: linear-gradient( 90deg, rgba(255, 60, 60, .22), rgba(255, 120, 80, .10));
        }
        
        .combat-status {
            display: inline-flex;
            padding: 8px 14px;
            border-radius: 999px;
            background: rgba(255, 60, 60, .15);
            border: 1px solid rgba(255, 60, 60, .22);
            font-size: 10px;
            font-weight: 900;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: #ff6b45;
            margin-bottom: 18px;
        }
        /* VS */
        
        .vs-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .fighter {
            width: 120px;
            text-align: center;
        }
        
        .fighter-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: auto;
            font-size: 42px;
            background: linear-gradient( 180deg, #ff3b30, #ff8845);
        }
        
        .fighter-name {
            margin-top: 14px;
            font-size: 14px;
            font-weight: 700;
        }
        
        .vs-text {
            font-size: 38px;
            font-weight: 900;
            color: #ff6b45;
            text-shadow: 0 0 20px rgba(255, 60, 60, .35);
        }
        /* INFO */
        
        .combat-info {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, .05);
            padding-bottom: 10px;
        }
        
        .info-label {
            font-size: 11px;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, .48);
        }
        
        .info-value {
            font-size: 12px;
        }
        /* PANEL */
        
        .side-panel {
            width: 360px;
            height: 100vh;
            background: linear-gradient( 180deg, rgba(20, 8, 8, .96), rgba(8, 3, 3, .98));
            border-left: 1px solid rgba(255, 70, 70, .18);
            backdrop-filter: blur(18px);
            padding: 30px 24px;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            right: 0;
            z-index: 50;
            transform: translateX(110%);
            transition: .35s ease;
        }
        
        .side-panel.active {
            transform: translateX(0);
        }
        /* PANEL TITLES */
        
        .panel-title {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: .08em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        
        .panel-sub {
            font-size: 11px;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: #ff6b45;
            margin-bottom: 30px;
        }
        /* MENU */
        
        .panel-menu {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        
        .menu-btn {
            width: 100%;
            height: 58px;
            border: none;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 0 18px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: white;
            background: linear-gradient( 90deg, rgba(45, 12, 12, .95), rgba(68, 20, 20, .92));
            border: 1px solid rgba(255, 255, 255, .05);
            transition: .22s ease;
        }
        
        .menu-btn:hover {
            transform: translateX(-4px);
            border-color: rgba(255, 70, 70, .25);
            box-shadow: 0 0 18px rgba(255, 70, 70, .14);
        }
        
        .menu-btn.active {
            background: linear-gradient( 90deg, #ff3b30, #ff6b45);
        }
        
        .menu-icon {
            font-size: 22px;
        }
        /* CERRAR */
        
        .close-panel-btn {
            margin-top: auto;
            height: 56px;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            font-weight: 900;
            letter-spacing: .10em;
            text-transform: uppercase;
            color: white;
            background: linear-gradient( 90deg, #00E5FF, #00B8FF);
        }
        /* MODAL */
        
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .82);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-box {
            width: 560px;
            max-width: 94vw;
            border-radius: 28px;
            background: linear-gradient( 180deg, rgba(20, 8, 8, .96), rgba(8, 3, 3, .98));
            border: 1px solid rgba(255, 70, 70, .18);
            padding: 32px;
        }
        
        .modal-title {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: .08em;
            text-transform: uppercase;
            margin-bottom: 26px;
        }
        /* FORM */
        
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .form-group.full {
            grid-column: 1/3;
        }
        
        label {
            font-size: 10px;
            letter-spacing: .10em;
            text-transform: uppercase;
            color: #ff6b45;
        }
        
        input,
        select {
            width: 100%;
            height: 50px;
            border: none;
            outline: none;
            border-radius: 14px;
            padding: 0 16px;
            font-family: inherit;
            background: rgba(255, 255, 255, .06);
            border: 1px solid rgba(255, 255, 255, .06);
            color: white;
        }
        
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 14px;
            margin-top: 26px;
        }
        
        .cancel-btn,
        .save-btn {
            height: 52px;
            padding: 0 28px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 900;
            letter-spacing: .10em;
            text-transform: uppercase;
        }
        
        .cancel-btn {
            background: rgba(255, 255, 255, .08);
            color: white;
        }
        
        .save-btn {
            color: white;
            background: linear-gradient( 90deg, #ff3b30, #ff6b45);
        }
    </style>

</head>

<body>

    <!-- VIDEO -->

    <video class="video-bg" autoplay muted loop playsinline>

    <source
    src="../assets/bg/combates.mp4"
    type="video/mp4">

</video>

    <div class="video-overlay"></div>

    <div class="layout">

        <!-- CONTENIDO -->

        <section class="combat-section">

            <div class="combat-header">

                <div>

                    <h1 class="combat-title">
                        COMBATES
                    </h1>

                    <div class="combat-sub">
                        Gestión de enfrentamientos del torneo
                    </div>

                </div>

                <div class="top-actions">

                    <button class="panel-btn" id="togglePanel">

                    ☰ PANEL COMBATES

                </button>

                    <button class="create-btn" id="openModal">

                    + Crear Combate

                </button>

                </div>

            </div>

            <!-- GRID -->

            <div class="combat-grid" id="combatGrid">

                <div class="combat-card">

                    <div class="combat-top">

                        <div class="combat-status">
                            En preparación
                        </div>

                        <div class="vs-container">

                            <div class="fighter">

                                <div class="fighter-avatar">
                                    🥋
                                </div>

                                <div class="fighter-name">
                                    Goku
                                </div>

                            </div>

                            <div class="vs-text">
                                VS
                            </div>

                            <div class="fighter">

                                <div class="fighter-avatar">
                                    ⚔️
                                </div>

                                <div class="fighter-name">
                                    Vegeta
                                </div>

                            </div>

                        </div>

                    </div>

                    <div class="combat-info">

                        <div class="info-row">

                            <span class="info-label">
                            Arena
                        </span>

                            <span class="info-value">
                            Arena Central
                        </span>

                        </div>

                        <div class="info-row">

                            <span class="info-label">
                            Categoría
                        </span>

                            <span class="info-value">
                            Elite
                        </span>

                        </div>

                        <div class="info-row">

                            <span class="info-label">
                            Hora
                        </span>

                            <span class="info-value">
                            18:00
                        </span>

                        </div>

                    </div>

                </div>

            </div>

        </section>

        <!-- PANEL -->

        <aside class="side-panel" id="combatPanel">

            <div class="panel-title">
                COMBATES
            </div>

            <div class="panel-sub">
                Budokai Tournament System
            </div>

            <div class="panel-menu">

                <button class="menu-btn" onclick="window.location.href='index.html'">

                <span class="menu-icon">🏠</span>
                Inicio

            </button>

                <button class="menu-btn" onclick="window.location.href='staff.html'">

                <span class="menu-icon">👥</span>
                Staff

            </button>

                <button class="menu-btn" onclick="window.location.href='luchadores.html'">

                <span class="menu-icon">⚔️</span>
                Luchadores

            </button>

                <button class="menu-btn active">

                <span class="menu-icon">🥊</span>
                Combates

            </button>

                <button class="menu-btn">
                <span class="menu-icon">➕</span>
                Crear Combate
            </button>

                <button class="menu-btn">
                <span class="menu-icon">🏟️</span>
                Arenas
            </button>

                <button class="menu-btn">
                <span class="menu-icon">📅</span>
                Horarios
            </button>

                <button class="menu-btn">
                <span class="menu-icon">📊</span>
                Resultados
            </button>

            </div>

            <button class="close-panel-btn" id="closePanel">

            ✕ Cerrar Panel

        </button>

        </aside>

    </div>

    <!-- MODAL -->

    <div class="modal" id="combatModal">

        <div class="modal-box">

            <div class="modal-title">
                Crear Combate
            </div>

            <div class="form-grid">

                <div class="form-group">

                    <label>
                    Luchador 1
                </label>

                    <input type="text" id="fighter1" placeholder="Nombre">

                </div>

                <div class="form-group">

                    <label>
                    Luchador 2
                </label>

                    <input type="text" id="fighter2" placeholder="Nombre">

                </div>

                <div class="form-group">

                    <label>
                    Arena
                </label>

                    <input type="text" id="arena" placeholder="Arena">

                </div>

                <div class="form-group">

                    <label>
                    Hora
                </label>

                    <input type="time" id="hora">

                </div>

            </div>

            <div class="modal-actions">

                <button class="cancel-btn" id="closeModal">

                Cancelar

            </button>

                <button class="save-btn" id="saveCombat">

                Guardar

            </button>

            </div>

        </div>

    </div>

    <script>
        /* PANEL */

        const panel =
            document.getElementById('combatPanel');

        document
            .getElementById('togglePanel')
            .onclick = () => {

                panel.classList.add('active');

            };

        document
            .getElementById('closePanel')
            .onclick = () => {

                panel.classList.remove('active');

            };

        /* MODAL */

        const modal =
            document.getElementById('combatModal');

        document
            .getElementById('openModal')
            .onclick = () => {

                modal.classList.add('active');

            };

        document
            .getElementById('closeModal')
            .onclick = () => {

                modal.classList.remove('active');

            };

        window.onclick = (e) => {

            if (e.target === modal) {

                modal.classList.remove('active');

            }

        };

        /* CREAR COMBATE */

        document
            .getElementById('saveCombat')
            .onclick = () => {

                const f1 =
                    document.getElementById('fighter1').value;

                const f2 =
                    document.getElementById('fighter2').value;

                const arena =
                    document.getElementById('arena').value;

                const hora =
                    document.getElementById('hora').value;

                if (!f1 || !f2 || !arena || !hora) {

                    alert('Completa todos los campos');

                    return;
                }

                const card =
                    document.createElement('div');

                card.className =
                    'combat-card';

                card.innerHTML = `

        <div class="combat-top">

            <div class="combat-status">
                Programado
            </div>

            <div class="vs-container">

                <div class="fighter">

                    <div class="fighter-avatar">
                        🥋
                    </div>

                    <div class="fighter-name">
                        ${f1}
                    </div>

                </div>

                <div class="vs-text">
                    VS
                </div>

                <div class="fighter">

                    <div class="fighter-avatar">
                        ⚔️
                    </div>

                    <div class="fighter-name">
                        ${f2}
                    </div>

                </div>

            </div>

        </div>

        <div class="combat-info">

            <div class="info-row">

                <span class="info-label">
                    Arena
                </span>

                <span class="info-value">
                    ${arena}
                </span>

            </div>

            <div class="info-row">

                <span class="info-label">
                    Hora
                </span>

                <span class="info-value">
                    ${hora}
                </span>

            </div>

            <div class="info-row">

                <span class="info-label">
                    Estado
                </span>

                <span class="info-value">
                    Programado
                </span>

            </div>

        </div>

    `;

                document
                    .getElementById('combatGrid')
                    .appendChild(card);

                modal.classList.remove('active');

            };
    </script>

</body>

</html>
