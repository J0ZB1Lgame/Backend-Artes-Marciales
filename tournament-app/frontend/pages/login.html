<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Budokai System</title>

    <link rel="stylesheet" href="../css/login.css">

</head>

<body>

    <!-- VIDEO FONDO -->

    <div class="video-background">

        <video autoplay muted loop playsinline>

            <source
                src="../assets/bg/goku.mp4"
                type="video/mp4"
            >

        </video>

        <div class="video-overlay"></div>

    </div>

    <!-- CONTENIDO -->

    <main class="login-wrapper">

        <section class="login-panel">

            <!-- LOGO -->

            <div class="logo-container">

                <div class="logo-circle">
                    🐉
                </div>

                <div class="logo-text">

                    <div class="brand-title">
                        BUDOKAI SYSTEM
                    </div>

                    <div class="brand-subtitle">
                        SISTEMA TORNEO ARTES MARCIALES
                    </div>

                </div>

            </div>

            <!-- MINIJUEGO -->

            <div class="cloud-game" id="cloudGame"></div>

            <!-- CONTROLES -->

            <div class="game-controls">

                <button id="startGameBtn" type="button">
                    Iniciar Juego
                </button>

                <button id="pauseGameBtn" type="button">
                    Pausar
                </button>

                <button id="endGameBtn" type="button">
                    Terminar
                </button>

            </div>

            <!-- LOGIN -->

            <form id="loginForm">

                <div class="field-group">

                    <label>
                        Usuario
                    </label>

                    <input type="text" id="username" placeholder="admin" autocomplete="off">

                </div>

                <div class="field-group">

                    <label>
                        Contraseña
                    </label>

                    <div class="password-wrapper">

                        <input type="password" id="password" placeholder="••••••••">

                        <button type="button" class="toggle-password" id="togglePassword">👁</button>

                    </div>

                </div>

                <div id="attemptsInfo">
                    Intentos restantes: 3
                </div>

                <button type="submit" class="btn-login" id="btnLogin">
                    INICIAR SESIÓN
                </button>

            </form>

        </section>

    </main>

    <!-- JS -->
    <script src="../js/api.js"></script>
    <script src="../js/modules/login.js"></script>
    <script>
        document.getElementById('togglePassword').onclick = function() {
            const inp = document.getElementById('password');
            const show = inp.type === 'password';
            inp.type = show ? 'text' : 'password';
            this.textContent = show ? '🙈' : '👁';
        };
    </script>

</body>

</html>
