<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Staff — Budokai System</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            background: #000;
            color: white;
        }
        /* FONDO */
        
        .background {
            position: fixed;
            inset: 0;
            background-image: url('../assets/bg/staff.jpeg');
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
        }
        
        .background::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient( 90deg, rgba(0, 0, 0, .88) 0%, rgba(0, 0, 0, .60) 45%, rgba(0, 0, 0, .30) 100%);
        }
        /* LAYOUT */
        
        .layout {
            position: relative;
            z-index: 2;
            display: flex;
            width: 100%;
            height: 100vh;
        }
        /* INVENTARIO */
        
        .inventory-section {
            flex: 1;
            padding: 40px;
            overflow: auto;
        }
        
        .inventory-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
        }
        
        .inventory-title {
            font-size: 48px;
            font-weight: 900;
            letter-spacing: .05em;
            text-transform: uppercase;
            color: white;
            text-shadow: 0 0 20px rgba(0, 229, 255, .22);
        }
        
        .inventory-sub {
            margin-top: 10px;
            color: rgba(255, 255, 255, .72);
            font-size: 14px;
        }
        /* BOTONES */
        
        .top-actions {
            display: flex;
            gap: 16px;
        }
        
        .create-btn,
        .panel-btn {
            height: 58px;
            padding: 0 28px;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            font-weight: 900;
            letter-spacing: .10em;
            text-transform: uppercase;
        }
        
        .create-btn {
            color: #001018;
            background: linear-gradient( 90deg, #00E5FF, #00B8FF);
            box-shadow: 0 0 24px rgba(0, 229, 255, .25);
        }
        
        .panel-btn {
            color: white;
            background: rgba(255, 255, 255, .08);
            border: 1px solid rgba(255, 255, 255, .08);
        }
        /* GRID */
        
        .staff-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 22px;
        }
        /* CARD */
        
        .staff-card {
            border-radius: 24px;
            padding: 24px;
            background: linear-gradient( 180deg, rgba(10, 18, 42, .88), rgba(4, 8, 24, .94));
            border: 1px solid rgba(255, 255, 255, .08);
            backdrop-filter: blur(18px);
            transition: .22s ease;
        }
        
        .staff-card:hover {
            transform: translateY(-6px);
            border-color: rgba(0, 229, 255, .25);
            box-shadow: 0 0 28px rgba(0, 229, 255, .12);
        }
        
        .staff-top {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }
        
        .staff-avatar {
            width: 74px;
            height: 74px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            background: linear-gradient( 180deg, #00E5FF, #00B8FF);
            color: #001018;
            font-weight: 900;
        }
        
        .staff-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        
        .staff-role {
            font-size: 11px;
            letter-spacing: .10em;
            text-transform: uppercase;
            color: #00E5FF;
        }
        
        .staff-info {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, .05);
            padding-bottom: 10px;
        }
        
        .info-label {
            color: rgba(255, 255, 255, .48);
            font-size: 11px;
            letter-spacing: .08em;
            text-transform: uppercase;
        }
        
        .info-value {
            color: white;
            font-size: 12px;
        }
        /* PANEL DERECHO */
        
        .side-panel {
            width: 360px;
            height: 100vh;
            background: linear-gradient( 180deg, rgba(8, 15, 35, .96), rgba(3, 8, 22, .98));
            border-left: 1px solid rgba(0, 229, 255, .18);
            backdrop-filter: blur(18px);
            padding: 30px 24px;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            right: 0;
            z-index: 50;
            transform: translateX(110%);
            transition: .35s ease;
        }
        
        .side-panel.active {
            transform: translateX(0);
        }
        /* TITULOS */
        
        .panel-title {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: white;
            margin-bottom: 8px;
        }
        
        .panel-sub {
            font-size: 11px;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: #00E5FF;
            margin-bottom: 30px;
        }
        /* MENU */
        
        .panel-menu {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        
        .menu-btn {
            width: 100%;
            height: 58px;
            border: none;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 0 18px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: white;
            background: linear-gradient( 90deg, rgba(12, 20, 45, .95), rgba(20, 32, 68, .92));
            border: 1px solid rgba(255, 255, 255, .05);
            transition: .22s ease;
        }
        
        .menu-btn:hover {
            transform: translateX(-4px);
            border-color: rgba(0, 229, 255, .25);
            box-shadow: 0 0 18px rgba(0, 229, 255, .14);
        }
        
        .menu-btn.active {
            background: linear-gradient( 90deg, #00E5FF, #00B8FF);
            color: #001018;
        }
        
        .menu-icon {
            font-size: 22px;
        }
        /* MODAL */
        
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .82);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-box {
            width: 520px;
            max-width: 94vw;
            border-radius: 28px;
            background: linear-gradient( 180deg, rgba(8, 15, 35, .96), rgba(3, 8, 22, .98));
            border: 1px solid rgba(0, 229, 255, .18);
            padding: 32px;
        }
        
        .modal-title {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: white;
            margin-bottom: 26px;
        }
        /* FORM */
        
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .form-group.full {
            grid-column: 1/3;
        }
        
        label {
            font-size: 10px;
            letter-spacing: .10em;
            text-transform: uppercase;
            color: #00E5FF;
        }
        
        input,
        select {
            width: 100%;
            height: 50px;
            border: none;
            outline: none;
            border-radius: 14px;
            padding: 0 16px;
            font-family: inherit;
            background: rgba(255, 255, 255, .06);
            border: 1px solid rgba(255, 255, 255, .06);
            color: white;
        }
        
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 14px;
            margin-top: 26px;
        }
        
        .cancel-btn,
        .save-btn {
            height: 52px;
            padding: 0 28px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 900;
            letter-spacing: .10em;
            text-transform: uppercase;
        }
        
        .cancel-btn {
            background: rgba(255, 255, 255, .08);
            color: white;
        }
        
        .save-btn {
            color: #001018;
            background: linear-gradient( 90deg, #00E5FF, #00B8FF);
        }
    </style>

</head>

<body>

    <div class="background"></div>

    <div class="layout">

        <!-- INVENTARIO -->

        <section class="inventory-section">

            <div class="inventory-header">

                <div>

                    <h1 class="inventory-title">
                        STAFF DEL TORNEO
                    </h1>

                    <div class="inventory-sub">
                        Gestión completa del personal del Budokai Tournament
                    </div>

                </div>

                <div class="top-actions">

                    <button class="panel-btn" id="toggleStaffPanel">

                    ☰ PANEL STAFF

                </button>

                    <button class="create-btn" id="openModal">

                    + Crear Staff

                </button>

                </div>

            </div>

            <!-- GRID -->

            <div class="staff-grid" id="staffGrid">

                <div class="staff-card">

                    <div class="staff-top">

                        <div class="staff-avatar">
                            👤
                        </div>

                        <div>

                            <div class="staff-name">
                                Admin Staff
                            </div>

                            <div class="staff-role">
                                Director del torneo
                            </div>

                        </div>

                    </div>

                    <div class="staff-info">

                        <div class="info-row">
                            <span class="info-label">
                            Zona
                        </span>

                            <span class="info-value">
                            Administración
                        </span>
                        </div>

                        <div class="info-row">
                            <span class="info-label">
                            Estado
                        </span>

                            <span class="info-value">
                            Activo
                        </span>
                        </div>

                        <div class="info-row">
                            <span class="info-label">
                            ID
                        </span>

                            <span class="info-value">
                            #001
                        </span>
                        </div>

                    </div>

                </div>

            </div>

        </section>

        <!-- PANEL -->

        <aside class="side-panel" id="staffPanel">

            <div class="panel-title">
                STAFF
            </div>

            <div class="panel-sub">
                Budokai Tournament System
            </div>

            <div class="panel-menu">

                <button class="menu-btn" onclick="window.location.href='index.html'">

                <span class="menu-icon">🏠</span>
                Inicio

            </button>

                <button class="menu-btn active">

                <span class="menu-icon">👥</span>
                Staff

            </button>

                <button class="menu-btn">
                <span class="menu-icon">➕</span>
                Crear Staff
            </button>

                <button class="menu-btn">
                <span class="menu-icon">✏️</span>
                Editar Staff
            </button>

                <button class="menu-btn">
                <span class="menu-icon">🗑️</span>
                Eliminar Staff
            </button>

                <button class="menu-btn">
                <span class="menu-icon">🛡️</span>
                Roles
            </button>

                <button class="menu-btn">
                <span class="menu-icon">📍</span>
                Zonas
            </button>

                <button class="menu-btn">
                <span class="menu-icon">📊</span>
                Estadísticas
            </button>

            </div>

        </aside>

    </div>

    <!-- MODAL -->

    <div class="modal" id="staffModal">

        <div class="modal-box">

            <div class="modal-title">
                Crear Staff
            </div>

            <div class="form-grid">

                <div class="form-group">

                    <label>
                    Nombre
                </label>

                    <input type="text" id="staffNombre" placeholder="Nombre completo">

                </div>

                <div class="form-group">

                    <label>
                    Rol
                </label>

                    <select id="staffRol">

                    <option>
                        Director del torneo
                    </option>

                    <option>
                        Árbitro
                    </option>

                    <option>
                        Seguridad
                    </option>

                    <option>
                        Médico
                    </option>

                </select>

                </div>

                <div class="form-group full">

                    <label>
                    Zona
                </label>

                    <input type="text" id="staffZona" placeholder="Zona asignada">

                </div>

            </div>

            <div class="modal-actions">

                <button class="cancel-btn" id="closeModal">

                Cancelar

            </button>

                <button class="save-btn" id="saveStaff">

                Guardar

            </button>

            </div>

        </div>

    </div>

    <script>

    /*
    |--------------------------------------------------------------------------
    | PANEL STAFF
    |--------------------------------------------------------------------------
    */

    const staffPanel =
        document.getElementById('staffPanel');

    document
        .getElementById('toggleStaffPanel')
        .onclick = () => {

            staffPanel.classList.toggle('active');

        };

    /*
    |--------------------------------------------------------------------------
    | MODAL
    |--------------------------------------------------------------------------
    */

    const modal =
        document.getElementById('staffModal');

    document
        .getElementById('openModal')
        .onclick = () => {

            modal.classList.add('active');

        };

    document
        .getElementById('closeModal')
        .onclick = () => {

            modal.classList.remove('active');

        };

    window.onclick = (e) => {

        if (e.target === modal) {

            modal.classList.remove('active');

        }

    };

    /*
    |--------------------------------------------------------------------------
    | API URL
    |--------------------------------------------------------------------------
    */

    const API_URL =
        'http://localhost/backend/api/endpoints/staff/staff.api.php';

    /*
    |--------------------------------------------------------------------------
    | CARGAR STAFF
    |--------------------------------------------------------------------------
    */

    async function cargarStaff(){

        try {

            const response =
                await fetch(API_URL);

            const result =
                await response.json();

            if(result.success){

                renderStaff(result.data);

            }

        } catch(error){

            console.error(error);

        }

    }

    /*
    |--------------------------------------------------------------------------
    | RENDER STAFF
    |--------------------------------------------------------------------------
    */

    function renderStaff(staffList){

        const grid =
            document.getElementById('staffGrid');

        grid.innerHTML = '';

        if(!staffList || staffList.length === 0){

            grid.innerHTML = `

                <div class="staff-card">

                    <div class="staff-name">
                        No hay staff registrado
                    </div>

                </div>

            `;

            return;

        }

        staffList.forEach(staff => {

            const card =
                document.createElement('div');

            card.className =
                'staff-card';

            card.innerHTML = `

                <div class="staff-top">

                    <div class="staff-avatar">
                        👤
                    </div>

                    <div>

                        <div class="staff-name">
                            ${staff.nombre} ${staff.apellido}
                        </div>

                        <div class="staff-role">
                            ${staff.id_rol ?? 'Sin rol'}
                        </div>

                    </div>

                </div>

                <div class="staff-info">

                    <div class="info-row">

                        <span class="info-label">
                            Zona
                        </span>

                        <span class="info-value">
                            ${staff.id_zona ?? 'Sin zona'}
                        </span>

                    </div>

                    <div class="info-row">

                        <span class="info-label">
                            Estado
                        </span>

                        <span class="info-value">
                            ${staff.estado}
                        </span>

                    </div>

                    <div class="info-row">

                        <span class="info-label">
                            ID
                        </span>

                        <span class="info-value">
                            #${staff.id_staff_torneo}
                        </span>

                    </div>

                </div>

            `;

            grid.appendChild(card);

        });

    }

    /*
    |--------------------------------------------------------------------------
    | CREAR STAFF
    |--------------------------------------------------------------------------
    */

    document
        .getElementById('saveStaff')
        .onclick = async () => {

            const nombre =
                document.getElementById('staffNombre').value;

            const rol =
                document.getElementById('staffRol').value;

            const zona =
                document.getElementById('staffZona').value;

            if(!nombre || !zona){

                alert('Completa todos los campos');

                return;

            }

            /*
            |--------------------------------------------------------------------------
            | Separar nombre y apellido
            |--------------------------------------------------------------------------
            */

            const partes =
                nombre.split(' ');

            const nombreReal =
                partes[0];

            const apellidoReal =
                partes.slice(1).join(' ') || 'SinApellido';

            /*
            |--------------------------------------------------------------------------
            | Data
            |--------------------------------------------------------------------------
            */

            const data = {

                nombre: nombreReal,

                apellido: apellidoReal,

                tipo_documento: 'CC',

                numero_documento:
                    Math.floor(Math.random() * 99999999).toString(),

                telefono: '',

                email: '',

                estado: 'activo',

                id_rol: 1,

                id_zona: 1,

                foto: '',

                direccion: '',

                fecha_nacimiento: '2000-01-01',

                observaciones: ''

            };

            try {

                const response =
                    await fetch(API_URL, {

                        method: 'POST',

                        headers: {

                            'Content-Type':
                                'application/json'

                        },

                        body:
                            JSON.stringify(data)

                    });

                const result =
                    await response.json();

                if(result.success){

                    alert('Staff creado correctamente');

                    modal.classList.remove('active');

                    document.getElementById('staffNombre').value = '';

                    document.getElementById('staffZona').value = '';

                    cargarStaff();

                } else {

                    alert(result.message);

                }

            } catch(error){

                console.error(error);

                alert('Error de conexión');

            }

        };

    /*
    |--------------------------------------------------------------------------
    | INIT
    |--------------------------------------------------------------------------
    */

    cargarStaff();

</script>

</body>

</html>
