<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Torneo — Budokai System</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            background: #000;
            color: white;
        }
        /* VIDEO */
        
        .video-bg {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }
        
        .video-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient( 90deg, rgba(0, 0, 0, .92) 0%, rgba(0, 0, 0, .60) 45%, rgba(0, 0, 0, .24) 100%);
            z-index: -1;
        }
        /* LAYOUT */
        
        .layout {
            width: 100%;
            height: 100vh;
            display: flex;
        }
        /* CONTENIDO */
        
        .tournament-section {
            flex: 1;
            padding: 40px;
            overflow: auto;
        }
        
        .tournament-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
        }
        
        .tournament-title {
            font-size: 52px;
            font-weight: 900;
            letter-spacing: .05em;
            text-transform: uppercase;
            text-shadow: 0 0 24px rgba(255, 215, 0, .22);
        }
        
        .tournament-sub {
            margin-top: 10px;
            font-size: 14px;
            color: rgba(255, 255, 255, .72);
        }
        /* BOTONES */
        
        .top-actions {
            display: flex;
            gap: 16px;
        }
        
        .create-btn,
        .panel-btn {
            height: 58px;
            padding: 0 28px;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            font-weight: 900;
            letter-spacing: .10em;
            text-transform: uppercase;
        }
        
        .create-btn {
            color: #1b1200;
            background: linear-gradient( 90deg, #FFD700, #FFB300);
            box-shadow: 0 0 24px rgba(255, 215, 0, .25);
        }
        
        .panel-btn {
            color: white;
            background: rgba(255, 255, 255, .08);
            border: 1px solid rgba(255, 255, 255, .08);
        }
        /* GRID */
        
        .tournament-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 24px;
        }
        /* CARD */
        
        .tournament-card {
            border-radius: 28px;
            overflow: hidden;
            background: linear-gradient( 180deg, rgba(24, 18, 5, .92), rgba(10, 7, 2, .96));
            border: 1px solid rgba(255, 255, 255, .08);
            backdrop-filter: blur(18px);
            transition: .22s ease;
        }
        
        .tournament-card:hover {
            transform: translateY(-6px);
            border-color: rgba(255, 215, 0, .28);
            box-shadow: 0 0 30px rgba(255, 215, 0, .12);
        }
        /* TOP */
        
        .tournament-top {
            padding: 28px;
            background: linear-gradient( 90deg, rgba(255, 215, 0, .18), rgba(255, 160, 0, .08));
        }
        
        .tournament-status {
            display: inline-flex;
            padding: 8px 14px;
            border-radius: 999px;
            background: rgba(255, 215, 0, .12);
            border: 1px solid rgba(255, 215, 0, .20);
            font-size: 10px;
            font-weight: 900;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: #FFD700;
            margin-bottom: 18px;
        }
        
        .tournament-icon {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: auto;
            font-size: 56px;
            background: linear-gradient( 180deg, #FFD700, #FF9800);
            color: #241700;
            box-shadow: 0 0 22px rgba(255, 215, 0, .35);
        }
        
        .tournament-name {
            margin-top: 22px;
            text-align: center;
            font-size: 24px;
            font-weight: 900;
        }
        /* INFO */
        
        .tournament-info {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, .05);
            padding-bottom: 10px;
        }
        
        .info-label {
            font-size: 11px;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, .48);
        }
        
        .info-value {
            font-size: 12px;
        }
        /* PANEL */
        
        .side-panel {
            width: 360px;
            height: 100vh;
            background: linear-gradient( 180deg, rgba(24, 18, 5, .96), rgba(10, 7, 2, .98));
            border-left: 1px solid rgba(255, 215, 0, .18);
            backdrop-filter: blur(18px);
            padding: 30px 24px;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            right: 0;
            z-index: 50;
            transform: translateX(110%);
            transition: .35s ease;
        }
        
        .side-panel.active {
            transform: translateX(0);
        }
        /* TITULOS PANEL */
        
        .panel-title {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: .08em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        
        .panel-sub {
            font-size: 11px;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: #FFD700;
            margin-bottom: 30px;
        }
        /* MENU */
        
        .panel-menu {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        
        .menu-btn {
            width: 100%;
            height: 58px;
            border: none;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 0 18px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: white;
            background: linear-gradient( 90deg, rgba(48, 35, 8, .95), rgba(68, 50, 12, .92));
            border: 1px solid rgba(255, 255, 255, .05);
            transition: .22s ease;
        }
        
        .menu-btn:hover {
            transform: translateX(-4px);
            border-color: rgba(255, 215, 0, .25);
            box-shadow: 0 0 18px rgba(255, 215, 0, .14);
        }
        
        .menu-btn.active {
            background: linear-gradient( 90deg, #FFD700, #FFB300);
            color: #241700;
        }
        
        .menu-icon {
            font-size: 22px;
        }
        /* CERRAR */
        
        .close-panel-btn {
            margin-top: auto;
            height: 56px;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            font-weight: 900;
            letter-spacing: .10em;
            text-transform: uppercase;
            color: #241700;
            background: linear-gradient( 90deg, #FFD700, #FFB300);
        }
        /* MODAL */
        
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .82);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-box {
            width: 560px;
            max-width: 94vw;
            border-radius: 28px;
            background: linear-gradient( 180deg, rgba(24, 18, 5, .96), rgba(10, 7, 2, .98));
            border: 1px solid rgba(255, 215, 0, .18);
            padding: 32px;
        }
        
        .modal-title {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: .08em;
            text-transform: uppercase;
            margin-bottom: 26px;
        }
        /* FORM */
        
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .form-group.full {
            grid-column: 1/3;
        }
        
        label {
            font-size: 10px;
            letter-spacing: .10em;
            text-transform: uppercase;
            color: #FFD700;
        }
        
        input,
        select {
            width: 100%;
            height: 50px;
            border: none;
            outline: none;
            border-radius: 14px;
            padding: 0 16px;
            font-family: inherit;
            background: rgba(255, 255, 255, .06);
            border: 1px solid rgba(255, 255, 255, .06);
            color: white;
        }
        
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 14px;
            margin-top: 26px;
        }
        
        .cancel-btn,
        .save-btn {
            height: 52px;
            padding: 0 28px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 900;
            letter-spacing: .10em;
            text-transform: uppercase;
        }
        
        .cancel-btn {
            background: rgba(255, 255, 255, .08);
            color: white;
        }
        
        .save-btn {
            color: #241700;
            background: linear-gradient( 90deg, #FFD700, #FFB300);
        }
    </style>

</head>

<body>

    <!-- VIDEO -->

    <video class="video-bg" autoplay muted loop playsinline>

    <source
    src="../assets/bg/torneo.mp4"
    type="video/mp4">

</video>

    <div class="video-overlay"></div>

    <div class="layout">

        <!-- CONTENIDO -->

        <section class="tournament-section">

            <div class="tournament-header">

                <div>

                    <h1 class="tournament-title">
                        TORNEOS
                    </h1>

                    <div class="tournament-sub">
                        Gestión completa del campeonato Budokai
                    </div>

                </div>

                <div class="top-actions">

                    <button class="panel-btn" id="togglePanel">

                    ☰ PANEL TORNEO

                </button>

                    <button class="create-btn" id="openModal">

                    + Crear Torneo

                </button>

                </div>

            </div>

            <!-- GRID -->

            <div class="tournament-grid" id="tournamentGrid">

                <div class="tournament-card">

                    <div class="tournament-top">

                        <div class="tournament-status">
                            Activo
                        </div>

                        <div class="tournament-icon">
                            🏆
                        </div>

                        <div class="tournament-name">
                            Budokai Tenkaichi
                        </div>

                    </div>

                    <div class="tournament-info">

                        <div class="info-row">

                            <span class="info-label">
                            Participantes
                        </span>

                            <span class="info-value">
                            32
                        </span>

                        </div>

                        <div class="info-row">

                            <span class="info-label">
                            Arena
                        </span>

                            <span class="info-value">
                            Arena Central
                        </span>

                        </div>

                        <div class="info-row">

                            <span class="info-label">
                            Estado
                        </span>

                            <span class="info-value">
                            En Curso
                        </span>

                        </div>

                    </div>

                </div>

            </div>

        </section>

        <!-- PANEL -->

        <aside class="side-panel" id="tournamentPanel">

            <div class="panel-title">
                TORNEO
            </div>

            <div class="panel-sub">
                Budokai Tournament System
            </div>

            <div class="panel-menu">

                <button class="menu-btn" onclick="window.location.href='index.html'">

                <span class="menu-icon">🏠</span>
                Inicio

            </button>

                <button class="menu-btn" onclick="window.location.href='staff.html'">

                <span class="menu-icon">👥</span>
                Staff

            </button>

                <button class="menu-btn" onclick="window.location.href='luchadores.html'">

                <span class="menu-icon">⚔️</span>
                Luchadores

            </button>

                <button class="menu-btn" onclick="window.location.href='combates.html'">

                <span class="menu-icon">🥊</span>
                Combates

            </button>

                <button class="menu-btn active">

                <span class="menu-icon">🏆</span>
                Torneo

            </button>

                <button class="menu-btn">
                <span class="menu-icon">➕</span>
                Crear Torneo
            </button>

                <button class="menu-btn">
                <span class="menu-icon">📅</span>
                Calendario
            </button>

                <button class="menu-btn">
                <span class="menu-icon">📊</span>
                Clasificación
            </button>

                <button class="menu-btn">
                <span class="menu-icon">👑</span>
                Campeones
            </button>

            </div>

            <button class="close-panel-btn" id="closePanel">

            ✕ Cerrar Panel

        </button>

        </aside>

    </div>

    <!-- MODAL -->

    <div class="modal" id="tournamentModal">

        <div class="modal-box">

            <div class="modal-title">
                Crear Torneo
            </div>

            <div class="form-grid">

                <div class="form-group">

                    <label>
                    Nombre del torneo
                </label>

                    <input type="text" id="tournamentName" placeholder="Budokai Tenkaichi">

                </div>

                <div class="form-group">

                    <label>
                    Arena
                </label>

                    <input type="text" id="tournamentArena" placeholder="Arena Central">

                </div>

                <div class="form-group">

                    <label>
                    Participantes
                </label>

                    <input type="number" id="tournamentPlayers" placeholder="32">

                </div>

                <div class="form-group">

                    <label>
                    Estado
                </label>

                    <select id="tournamentStatus">

                    <option>
                        En Curso
                    </option>

                    <option>
                        Próximamente
                    </option>

                    <option>
                        Finalizado
                    </option>

                </select>

                </div>

            </div>

            <div class="modal-actions">

                <button class="cancel-btn" id="closeModal">

                Cancelar

            </button>

                <button class="save-btn" id="saveTournament">

                Guardar

            </button>

            </div>

        </div>

    </div>

    <script>
        /* PANEL */

        const panel =
            document.getElementById('tournamentPanel');

        document
            .getElementById('togglePanel')
            .onclick = () => {

                panel.classList.add('active');

            };

        document
            .getElementById('closePanel')
            .onclick = () => {

                panel.classList.remove('active');

            };

        /* MODAL */

        const modal =
            document.getElementById('tournamentModal');

        document
            .getElementById('openModal')
            .onclick = () => {

                modal.classList.add('active');

            };

        document
            .getElementById('closeModal')
            .onclick = () => {

                modal.classList.remove('active');

            };

        window.onclick = (e) => {

            if (e.target === modal) {

                modal.classList.remove('active');

            }

        };

        /* CREAR TORNEO */

        document
            .getElementById('saveTournament')
            .onclick = () => {

                const nombre =
                    document.getElementById('tournamentName').value;

                const arena =
                    document.getElementById('tournamentArena').value;

                const participantes =
                    document.getElementById('tournamentPlayers').value;

                const estado =
                    document.getElementById('tournamentStatus').value;

                if (!nombre || !arena || !participantes) {

                    alert('Completa todos los campos');

                    return;
                }

                const card =
                    document.createElement('div');

                card.className =
                    'tournament-card';

                card.innerHTML = `

        <div class="tournament-top">

            <div class="tournament-status">
                ${estado}
            </div>

            <div class="tournament-icon">
                🏆
            </div>

            <div class="tournament-name">
                ${nombre}
            </div>

        </div>

        <div class="tournament-info">

            <div class="info-row">

                <span class="info-label">
                    Participantes
                </span>

                <span class="info-value">
                    ${participantes}
                </span>

            </div>

            <div class="info-row">

                <span class="info-label">
                    Arena
                </span>

                <span class="info-value">
                    ${arena}
                </span>

            </div>

            <div class="info-row">

                <span class="info-label">
                    Estado
                </span>

                <span class="info-value">
                    ${estado}
                </span>

            </div>

        </div>

    `;

                document
                    .getElementById('tournamentGrid')
                    .appendChild(card);

                modal.classList.remove('active');

            };
    </script>

</body>

</html>
