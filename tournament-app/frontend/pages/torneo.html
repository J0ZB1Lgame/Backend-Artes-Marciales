<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torneo — Budokai System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Orbitron', sans-serif; overflow: hidden; background: #000; color: white; }

        .video-bg { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: -2; }
        .video-overlay { position: fixed; inset: 0; background: linear-gradient(90deg, rgba(0,0,0,.92) 0%, rgba(0,0,0,.60) 45%, rgba(0,0,0,.24) 100%); z-index: -1; }

        .layout { width: 100%; height: 100vh; display: flex; }

        /* CONTENIDO */
        .tournament-section { flex: 1; padding: 40px; overflow: auto; }
        .tournament-header  { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .tournament-title   { font-size: 52px; font-weight: 900; letter-spacing: .05em; text-transform: uppercase; text-shadow: 0 0 24px rgba(255,215,0,.22); }
        .tournament-sub     { margin-top: 10px; font-size: 14px; color: rgba(255,255,255,.72); }

        .top-actions { display: flex; gap: 16px; }
        .create-btn, .panel-btn {
            height: 58px; padding: 0 28px; border: none; border-radius: 18px; cursor: pointer;
            font-family: inherit; font-size: 13px; font-weight: 900; letter-spacing: .10em; text-transform: uppercase;
        }
        .create-btn { color: #1b1200; background: linear-gradient(90deg, #FFD700, #FFB300); box-shadow: 0 0 24px rgba(255,215,0,.25); }
        .panel-btn  { color: white; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.08); }

        /* STATS */
        .stats-bar { display: flex; gap: 14px; margin-bottom: 18px; flex-wrap: wrap; }
        .stat-pill {
            padding: 10px 18px; border-radius: 14px;
            background: rgba(24,18,5,.82); border: 1px solid rgba(255,215,0,.18);
            font-size: 11px; letter-spacing: .10em; text-transform: uppercase; color: rgba(255,255,255,.72);
        }
        .stat-pill span { font-size: 18px; font-weight: 900; color: #FFD700; display: block; }

        /* GRID */
        .tournament-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 24px; }

        /* CARD */
        .tournament-card {
            border-radius: 28px; overflow: hidden;
            background: linear-gradient(180deg, rgba(24,18,5,.92), rgba(10,7,2,.96));
            border: 1px solid rgba(255,255,255,.08); backdrop-filter: blur(18px); transition: .22s ease;
        }
        .tournament-card:hover { transform: translateY(-6px); border-color: rgba(255,215,0,.28); box-shadow: 0 0 30px rgba(255,215,0,.12); }

        .tournament-header-card { padding: 20px 24px 0; display: flex; justify-content: space-between; align-items: flex-start; }
        .tournament-title-card  { font-size: 18px; font-weight: 900; }
        .tournament-status {
            display: inline-flex; padding: 6px 12px; border-radius: 999px;
            background: rgba(255,215,0,.12); border: 1px solid rgba(255,215,0,.20);
            font-size: 9px; font-weight: 900; letter-spacing: .12em; text-transform: uppercase; color: #FFD700;
        }
        .tournament-info { padding: 16px 24px; display: flex; flex-direction: column; gap: 10px; }
        .info-row { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,.05); padding-bottom: 8px; }
        .info-label { font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: rgba(255,255,255,.48); }
        .info-value { font-size: 11px; }
        .tournament-description { padding: 0 24px 14px; font-size: 11px; color: rgba(255,255,255,.5); line-height: 1.5; }
        .tournament-actions { display: flex; gap: 8px; padding: 0 24px 20px; flex-wrap: wrap; }

        /* BADGES */
        .badge { display: inline-block; padding: 3px 9px; border-radius: 999px; font-size: 9px; font-weight: 900; letter-spacing: .10em; }
        .badge-activo     { background: rgba(0,220,120,.18);  color: #00dc78; border: 1px solid rgba(0,220,120,.25); }
        .badge-finalizado { background: rgba(0,150,255,.18);  color: #4db8ff; border: 1px solid rgba(0,150,255,.25); }
        .badge-proximo    { background: rgba(255,215,0,.18);  color: #ffd700; border: 1px solid rgba(255,215,0,.25); }
        .badge-cancelado  { background: rgba(255,80,80,.18);  color: #ff8080; border: 1px solid rgba(255,80,80,.25); }
        .badge-pesado     { background: rgba(255,80,80,.18);  color: #ff8080; border: 1px solid rgba(255,80,80,.25); }
        .badge-medio      { background: rgba(255,200,0,.18);  color: #ffd700; border: 1px solid rgba(255,200,0,.25); }
        .badge-ligero     { background: rgba(0,220,120,.18);  color: #00dc78; border: 1px solid rgba(0,220,120,.25); }
        .badge-pluma      { background: rgba(180,100,255,.18);color: #b464ff; border: 1px solid rgba(180,100,255,.25); }
        .badge-absoluto   { background: rgba(255,215,0,.25);  color: #ffd700; border: 1px solid rgba(255,215,0,.40); }
        .badge-default    { background: rgba(255,255,255,.08); color: rgba(255,255,255,.6); }

        .btn-bracket, .btn-edit, .btn-delete {
            height: 32px; padding: 0 12px; border: none; border-radius: 8px; cursor: pointer;
            font-family: inherit; font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
        }
        .btn-bracket { background: rgba(255,215,0,.14); color: #ffd700; border: 1px solid rgba(255,215,0,.22); }
        .btn-bracket:hover { background: rgba(255,215,0,.28); }
        .btn-edit    { background: rgba(255,180,0,.14);  color: #ffb400; border: 1px solid rgba(255,180,0,.20); }
        .btn-edit:hover    { background: rgba(255,180,0,.28); }
        .btn-delete  { background: rgba(255,80,80,.14);  color: #ff6060; border: 1px solid rgba(255,80,80,.20); }
        .btn-delete:hover  { background: rgba(255,80,80,.28); }

        #loading { display: none; text-align: center; padding: 40px; font-size: 13px; color: rgba(255,255,255,.55); }
        #no-data  { display: none; text-align: center; padding: 40px; font-size: 13px; color: rgba(255,255,255,.45); }

        /* PANEL LATERAL */
        .side-panel {
            width: 360px; height: 100vh;
            background: linear-gradient(180deg, rgba(24,18,5,.96), rgba(10,7,2,.98));
            border-left: 1px solid rgba(255,215,0,.18); backdrop-filter: blur(18px);
            padding: 30px 24px; display: flex; flex-direction: column;
            position: fixed; top: 0; right: 0; z-index: 50;
            transform: translateX(110%); transition: .35s ease;
        }
        .side-panel.active { transform: translateX(0); }
        .panel-title { font-size: 28px; font-weight: 900; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 8px; }
        .panel-sub   { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: #FFD700; margin-bottom: 30px; }
        .panel-menu  { display: flex; flex-direction: column; gap: 14px; flex: 1; min-height: 0; overflow-y: auto; padding-right: 4px; }
        .menu-btn {
            width: 100%; height: 58px; border: none; border-radius: 16px;
            display: flex; align-items: center; gap: 14px; padding: 0 18px;
            cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 700;
            letter-spacing: .08em; text-transform: uppercase; color: white;
            background: linear-gradient(90deg, rgba(48,35,8,.95), rgba(68,50,12,.92));
            border: 1px solid rgba(255,255,255,.05); transition: .22s ease;
        }
        .menu-btn:hover { transform: translateX(-4px); border-color: rgba(255,215,0,.25); box-shadow: 0 0 18px rgba(255,215,0,.14); }
        .menu-btn.active { background: linear-gradient(90deg, #FFD700, #FFB300); color: #241700; }
        .menu-icon { font-size: 22px; }
        .close-panel-btn {
            margin-top: auto; height: 56px; border: none; border-radius: 18px; cursor: pointer;
            font-family: inherit; font-size: 13px; font-weight: 900; letter-spacing: .10em;
            text-transform: uppercase; color: #241700; background: linear-gradient(90deg, #FFD700, #FFB300);
        }

        /* MODAL */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,.82);
            display: none; align-items: center; justify-content: center; z-index: 999;
        }
        .modal.open { display: flex; }
        .modal-box {
            width: 580px; max-width: 94vw; border-radius: 28px;
            background: linear-gradient(180deg, rgba(24,18,5,.96), rgba(10,7,2,.98));
            border: 1px solid rgba(255,215,0,.18); padding: 32px; max-height: 90vh; overflow-y: auto;
        }
        .modal-title { font-size: 22px; font-weight: 900; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 24px; }
        .form-grid  { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group.full { grid-column: 1/3; }
        label { font-size: 10px; letter-spacing: .10em; text-transform: uppercase; color: #FFD700; }
        input, select, textarea {
            width: 100%; height: 48px; border: none; outline: none; border-radius: 12px;
            padding: 0 14px; font-family: inherit; font-size: 12px;
            background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.08); color: white;
        }
        textarea { height: 72px; padding: 12px 14px; resize: none; }
        select option { background: #180e02; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 22px; }
        .cancel-btn, .save-btn {
            height: 50px; padding: 0 26px; border: none; border-radius: 12px; cursor: pointer;
            font-family: inherit; font-weight: 900; letter-spacing: .10em; text-transform: uppercase;
        }
        .cancel-btn { background: rgba(255,255,255,.08); color: white; }
        .save-btn   { color: #241700; background: linear-gradient(90deg, #FFD700, #FFB300); }

        /* CAMPEON MEDIA BOX */
        .card-media {
            width: 100%; height: 130px; overflow: hidden; border-radius: 28px 28px 0 0;
            position: relative; background: #000;
        }
        .card-media video { width: 100%; height: 100%; object-fit: cover; display: block; }
        .campeon-label {
            position: absolute; bottom: 0; left: 0; right: 0; padding: 8px 14px;
            background: linear-gradient(0deg, rgba(0,0,0,.85), transparent);
            font-size: 12px; font-weight: 900; letter-spacing: .08em; color: #FFD700;
            text-shadow: 0 0 12px rgba(255,215,0,.6);
        }

        /* BRACKET MODAL */
        .modal-bracket { z-index: 1000; }
        .modal-box-bracket {
            width: 680px; max-width: 96vw; border-radius: 28px;
            background: linear-gradient(180deg, rgba(24,18,5,.97), rgba(10,7,2,.99));
            border: 1px solid rgba(255,215,0,.22); padding: 32px;
            max-height: 88vh; overflow-y: auto;
        }
        .bracket-torneo-title { font-size: 20px; font-weight: 900; letter-spacing: .08em; text-transform: uppercase; color: #FFD700; margin-bottom: 24px; }
        .bracket-ronda { margin-bottom: 28px; }
        .bracket-ronda-title {
            font-size: 11px; font-weight: 900; letter-spacing: .14em; text-transform: uppercase;
            color: rgba(255,215,0,.6); border-bottom: 1px solid rgba(255,215,0,.15); padding-bottom: 8px; margin-bottom: 14px;
        }
        .bracket-match {
            display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
            background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.06);
            border-radius: 14px; padding: 12px 16px;
        }
        .bracket-fighter { flex: 1; font-size: 12px; font-weight: 700; letter-spacing: .04em; }
        .bracket-fighter.winner { color: #FFD700; }
        .bracket-fighter.loser  { color: rgba(255,255,255,.35); text-decoration: line-through; }
        .bracket-vs { font-size: 10px; font-weight: 900; letter-spacing: .12em; color: rgba(255,255,255,.35); flex-shrink: 0; }
        .bracket-estado { flex-shrink: 0; }
        .bracket-empty { text-align: center; color: rgba(255,255,255,.35); font-size: 12px; padding: 30px 0; }
        .bracket-close-btn {
            margin-top: 22px; width: 100%; height: 50px; border: none; border-radius: 14px; cursor: pointer;
            font-family: inherit; font-size: 13px; font-weight: 900; letter-spacing: .10em; text-transform: uppercase;
            color: #241700; background: linear-gradient(90deg, #FFD700, #FFB300);
        }

        /* TOAST */
        .toast {
            position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px);
            background: rgba(24,18,5,.96); border-radius: 14px; padding: 14px 24px;
            font-size: 13px; font-weight: 700; letter-spacing: .06em;
            border: 1px solid rgba(255,215,0,.20); z-index: 2000;
            transition: transform .3s ease, opacity .3s ease; opacity: 0;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast--ok   { border-color: rgba(0,220,120,.30); color: #00dc78; }
        .toast--err  { border-color: rgba(255,80,80,.30);  color: #ff8080; }
        .toast--info { border-color: rgba(255,215,0,.30);  color: #ffd700; }
    </style>
</head>
<body>

<video class="video-bg" autoplay muted loop playsinline>
    <source src="../assets/bg/torneo.mp4" type="video/mp4">
</video>
<div class="video-overlay"></div>

<div class="layout">
    <section class="tournament-section">

        <!-- CABECERA -->
        <div class="tournament-header">
            <div>
                <h1 class="tournament-title">TORNEOS</h1>
                <div class="tournament-sub">Gestión completa del campeonato Budokai</div>
            </div>
            <div class="top-actions">
                <button class="panel-btn" id="togglePanel">☰ PANEL TORNEO</button>
                <button class="create-btn" id="openModal">+ Crear Torneo</button>
            </div>
        </div>

        <!-- STATS -->
        <div class="stats-bar">
            <div class="stat-pill"><span id="stat-total">0</span>Total</div>
            <div class="stat-pill"><span id="stat-activos">0</span>Activos</div>
            <div class="stat-pill"><span id="stat-finalizados">0</span>Finalizados</div>
            <div class="stat-pill"><span id="stat-proximos">0</span>Próximos</div>
        </div>

        <!-- GRID DE TORNEOS -->
        <div class="tournament-grid" id="bracketsContainer"></div>
        <div id="loading">Cargando torneos...</div>
        <div id="no-data">No hay torneos registrados.</div>

    </section>

    <!-- PANEL LATERAL -->
    <aside class="side-panel" id="tournamentPanel">
        <div class="panel-title">TORNEO</div>
        <div class="panel-sub">Budokai Tournament System</div>
        <div class="panel-menu">
            <button class="menu-btn" onclick="window.location.href='index.html'"><span class="menu-icon">🏠</span>Inicio</button>
            <button class="menu-btn" onclick="window.location.href='staff.html'"><span class="menu-icon">👥</span>Staff</button>
            <button class="menu-btn" onclick="window.location.href='luchadores.html'"><span class="menu-icon">⚔️</span>Luchadores</button>
            <button class="menu-btn" onclick="window.location.href='combates.html'"><span class="menu-icon">🥊</span>Combates</button>
            <button class="menu-btn active"><span class="menu-icon">🏆</span>Torneo</button>
            <button class="menu-btn" onclick="document.getElementById('openModal').click()"><span class="menu-icon">➕</span>Crear Torneo</button>
            <button class="menu-btn" onclick="window.location.href='estadisticas.html'"><span class="menu-icon">📊</span>Estadísticas</button>
            <button class="menu-btn" onclick="window.location.href='sistema.html'"><span class="menu-icon">⚙️</span>Sistema</button>
            <button class="menu-btn" onclick="cerrarSesion()"><span class="menu-icon">🚪</span>Cerrar Sesión</button>
        </div>
        <button class="close-panel-btn" id="closePanel">✕ Cerrar Panel</button>
    </aside>
</div>

<!-- MODAL CREAR / EDITAR TORNEO -->
<div class="modal" id="modal">
    <div class="modal-box">
        <div class="modal-title" id="modal-title">Crear Torneo</div>
        <form id="form-torneo">
            <div class="form-grid">
                <div class="form-group full">
                    <label>Nombre del Torneo</label>
                    <input type="text" id="f-nombre" placeholder="Ej: Budokai Tenkaichi" required>
                </div>
                <div class="form-group">
                    <label>Fecha Inicio</label>
                    <input type="date" id="f-fecha-inicio">
                </div>
                <div class="form-group">
                    <label>Fecha Fin</label>
                    <input type="date" id="f-fecha-fin">
                </div>
                <div class="form-group">
                    <label>Estado</label>
                    <select id="f-estado">
                        <option value="proximo">Próximo</option>
                        <option value="activo">Activo</option>
                        <option value="finalizado">Finalizado</option>
                        <option value="cancelado">Cancelado</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Modalidad</label>
                    <select id="f-categoria">
                        <option value="">Sin categoría</option>
                        <option value="Peso Pluma">Peso Pluma</option>
                        <option value="Peso Ligero">Peso Ligero</option>
                        <option value="Peso Medio">Peso Medio</option>
                        <option value="Peso Pesado">Peso Pesado</option>
                        <option value="Peso Absoluto">Peso Absoluto</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Tiempo Límite (min)</label>
                    <input type="number" id="f-tiempo-limite" min="1" max="60" value="3" placeholder="Ej: 3">
                </div>
                <div class="form-group full">
                    <label>Campeón</label>
                    <select id="f-campeon">
                        <option value="">Sin campeón definido</option>
                    </select>
                </div>
                <div class="form-group full">
                    <label>Descripción</label>
                    <textarea id="f-descripcion" placeholder="Descripción del torneo..."></textarea>
                </div>
                <div class="form-group full">
                    <label>Reglas</label>
                    <textarea id="f-reglas" placeholder="Reglas del torneo..."></textarea>
                </div>
                <div class="form-group full">
                    <label>Premio</label>
                    <input type="text" id="f-premio" placeholder="Ej: Cinturón de Campeón Mundial">
                </div>
            </div>
            <div class="modal-actions">
                <button type="button" class="cancel-btn" id="closeModal">Cancelar</button>
                <button type="submit" class="save-btn" id="btn-submit">Crear</button>
            </div>
        </form>
    </div>
</div>

<!-- MODAL BRACKET -->
<div class="modal modal-bracket" id="modal-bracket">
    <div class="modal-box-bracket">
        <div class="bracket-torneo-title" id="bracket-title">Bracket</div>
        <div id="bracket-content"></div>
        <button class="bracket-close-btn" id="closeBracket">✕ Cerrar</button>
    </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- JS -->
<script src="../js/api.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/modules/torneo.js"></script>
<script>
    const panel = document.getElementById('tournamentPanel');
    document.getElementById('togglePanel').onclick = () => panel.classList.add('active');
    document.getElementById('closePanel').onclick   = () => panel.classList.remove('active');

    function cerrarSesion() {
        if (confirm('¿Deseas cerrar sesión?')) {
            sessionStorage.removeItem('budokai_session');
            window.location.href = 'login.html';
        }
    }
</script>
</body>
</html>
