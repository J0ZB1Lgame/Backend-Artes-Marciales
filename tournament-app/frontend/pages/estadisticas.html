<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Estadísticas — Budokai System</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            background: #000;
            color: white;
        }
        /* VIDEO */
        
        .video-bg {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }
        
        .video-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient( 90deg, rgba(0, 0, 0, .92) 0%, rgba(0, 0, 0, .62) 45%, rgba(0, 0, 0, .22) 100%);
            z-index: -1;
        }
        /* LAYOUT */
        
        .layout {
            width: 100%;
            height: 100vh;
            display: flex;
        }
        /* CONTENT */
        
        .stats-section {
            flex: 1;
            padding: 40px;
            overflow: auto;
        }
        
        .stats-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
        }
        
        .stats-title {
            font-size: 52px;
            font-weight: 900;
            letter-spacing: .05em;
            text-transform: uppercase;
            text-shadow: 0 0 24px rgba(0, 255, 170, .22);
        }
        
        .stats-sub {
            margin-top: 10px;
            font-size: 14px;
            color: rgba(255, 255, 255, .72);
        }
        /* BUTTONS */
        
        .top-actions {
            display: flex;
            gap: 16px;
        }
        
        .panel-btn {
            height: 58px;
            padding: 0 28px;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            font-weight: 900;
            letter-spacing: .10em;
            text-transform: uppercase;
            color: white;
            background: rgba(255, 255, 255, .08);
            border: 1px solid rgba(255, 255, 255, .08);
        }
        /* CARDS */
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px;
            margin-bottom: 28px;
        }
        
        .stat-card {
            border-radius: 26px;
            padding: 28px;
            background: linear-gradient( 180deg, rgba(5, 25, 20, .90), rgba(3, 10, 8, .96));
            border: 1px solid rgba(255, 255, 255, .08);
            backdrop-filter: blur(18px);
            transition: .22s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-6px);
            border-color: rgba(0, 255, 170, .28);
            box-shadow: 0 0 30px rgba(0, 255, 170, .12);
        }
        
        .stat-icon {
            font-size: 42px;
            margin-bottom: 18px;
        }
        
        .stat-number {
            font-size: 54px;
            font-weight: 900;
            color: #00ffaa;
            margin-bottom: 10px;
        }
        
        .stat-label {
            font-size: 12px;
            letter-spacing: .10em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, .68);
        }
        /* CHARTS */
        
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
        }
        
        .chart-card {
            border-radius: 26px;
            padding: 28px;
            background: linear-gradient( 180deg, rgba(5, 25, 20, .90), rgba(3, 10, 8, .96));
            border: 1px solid rgba(255, 255, 255, .08);
            backdrop-filter: blur(18px);
        }
        
        .chart-title {
            font-size: 18px;
            font-weight: 900;
            margin-bottom: 22px;
            letter-spacing: .08em;
            text-transform: uppercase;
        }
        /* BARS */
        
        .bar-group {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        
        .bar-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .bar-top {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            letter-spacing: .08em;
            text-transform: uppercase;
        }
        
        .bar {
            width: 100%;
            height: 16px;
            border-radius: 999px;
            background: rgba(255, 255, 255, .06);
            overflow: hidden;
        }
        
        .bar-fill {
            height: 100%;
            border-radius: 999px;
            background: linear-gradient( 90deg, #00ffaa, #00d0ff);
        }
        /* PANEL */
        
        .side-panel {
            width: 360px;
            height: 100vh;
            background: linear-gradient( 180deg, rgba(5, 25, 20, .96), rgba(3, 10, 8, .98));
            border-left: 1px solid rgba(0, 255, 170, .18);
            backdrop-filter: blur(18px);
            padding: 30px 24px;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            right: 0;
            z-index: 50;
            transform: translateX(110%);
            transition: .35s ease;
        }
        
        .side-panel.active {
            transform: translateX(0);
        }
        /* TITLES */
        
        .panel-title {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: .08em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        
        .panel-sub {
            font-size: 11px;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: #00ffaa;
            margin-bottom: 30px;
        }
        /* MENU */
        
        .panel-menu {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        
        .menu-btn {
            width: 100%;
            height: 58px;
            border: none;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 0 18px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: white;
            background: linear-gradient( 90deg, rgba(5, 35, 28, .95), rgba(8, 58, 42, .92));
            border: 1px solid rgba(255, 255, 255, .05);
            transition: .22s ease;
        }
        
        .menu-btn:hover {
            transform: translateX(-4px);
            border-color: rgba(0, 255, 170, .25);
            box-shadow: 0 0 18px rgba(0, 255, 170, .14);
        }
        
        .menu-btn.active {
            background: linear-gradient( 90deg, #00ffaa, #00d0ff);
            color: #001814;
        }
        
        .menu-icon {
            font-size: 22px;
        }
        /* CLOSE */
        
        .close-panel-btn {
            margin-top: auto;
            height: 56px;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            font-weight: 900;
            letter-spacing: .10em;
            text-transform: uppercase;
            color: #001814;
            background: linear-gradient( 90deg, #00ffaa, #00d0ff);
        }
    </style>

</head>

<body>

    <!-- VIDEO -->

    <video class="video-bg" autoplay muted loop playsinline>

    <source
    src="../assets/bg/estadistica.mp4"
    type="video/mp4">

</video>

    <div class="video-overlay"></div>

    <div class="layout">

        <!-- CONTENT -->

        <section class="stats-section">

            <div class="stats-header">

                <div>

                    <h1 class="stats-title">
                        ESTADÍSTICAS
                    </h1>

                    <div class="stats-sub">
                        Análisis y métricas del torneo Budokai
                    </div>

                </div>

                <div class="top-actions">

                    <button class="panel-btn" id="togglePanel">

                    ☰ PANEL ESTADÍSTICAS

                </button>

                </div>

            </div>

            <!-- CARDS -->

            <div class="stats-grid">

                <div class="stat-card">

                    <div class="stat-icon">
                        🥋
                    </div>

                    <div class="stat-number">
                        0
                    </div>

                    <div class="stat-label">
                        Luchadores
                    </div>

                </div>

                <div class="stat-card">

                    <div class="stat-icon">
                        🥊
                    </div>

                    <div class="stat-number">
                        0
                    </div>

                    <div class="stat-label">
                        Combates
                    </div>

                </div>

                <div class="stat-card">

                    <div class="stat-icon">
                        🏆
                    </div>

                    <div class="stat-number">
                        0
                    </div>

                    <div class="stat-label">
                        Torneos
                    </div>

                </div>

                <div class="stat-card">

                    <div class="stat-icon">
                        👥
                    </div>

                    <div class="stat-number">
                        0
                    </div>

                    <div class="stat-label">
                        Staff
                    </div>

                </div>

            </div>

            <!-- CHARTS -->

            <div class="chart-grid">

                <div class="chart-card">

                    <div class="chart-title">
                        Participación
                    </div>

                    <div class="bar-group">

                        <div class="bar-item">

                            <div class="bar-top">

                                <span>
                                Elite
                            </span>

                                <span>
                                0%
                            </span>

                            </div>

                            <div class="bar">
                                <div class="bar-fill" style="width:0%"></div>
                            </div>

                        </div>

                        <div class="bar-item">

                            <div class="bar-top">

                                <span>
                                Amateur
                            </span>

                                <span>
                                0%
                            </span>

                            </div>

                            <div class="bar">
                                <div class="bar-fill" style="width:0%"></div>
                            </div>

                        </div>

                    </div>

                </div>

                <div class="chart-card">

                    <div class="chart-title">
                        Rendimiento
                    </div>

                    <div class="bar-group">

                        <div class="bar-item">

                            <div class="bar-top">

                                <span>
                                Victorias
                            </span>

                                <span>
                                0%
                            </span>

                            </div>

                            <div class="bar">
                                <div class="bar-fill" style="width:0%"></div>
                            </div>

                        </div>

                        <div class="bar-item">

                            <div class="bar-top">

                                <span>
                                Derrotas
                            </span>

                                <span>
                                0%
                            </span>

                            </div>

                            <div class="bar">
                                <div class="bar-fill" style="width:0%"></div>
                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </section>

        <!-- PANEL -->

        <aside class="side-panel" id="statsPanel">

            <div class="panel-title">
                ESTADÍSTICAS
            </div>

            <div class="panel-sub">
                Budokai Tournament System
            </div>

            <div class="panel-menu">

                <button class="menu-btn" onclick="window.location.href='index.html'">

                <span class="menu-icon">🏠</span>
                Inicio

            </button>

                <button class="menu-btn" onclick="window.location.href='staff.html'">

                <span class="menu-icon">👥</span>
                Staff

            </button>

                <button class="menu-btn" onclick="window.location.href='luchadores.html'">

                <span class="menu-icon">⚔️</span>
                Luchadores

            </button>

                <button class="menu-btn" onclick="window.location.href='combates.html'">

                <span class="menu-icon">🥊</span>
                Combates

            </button>

                <button class="menu-btn" onclick="window.location.href='torneo.html'">

                <span class="menu-icon">🏆</span>
                Torneo

            </button>

                <button class="menu-btn active">

                <span class="menu-icon">📊</span>
                Estadísticas

            </button>

                <button class="menu-btn">
                <span class="menu-icon">📈</span>
                Rendimiento
            </button>

                <button class="menu-btn">
                <span class="menu-icon">🏅</span>
                Ranking
            </button>

                <button class="menu-btn">
                <span class="menu-icon">⚡</span>
                Actividad
            </button>

            </div>

            <button class="close-panel-btn" id="closePanel">

            ✕ Cerrar Panel

        </button>

        </aside>

    </div>

    <script>
        /* PANEL */

        const panel =
            document.getElementById('statsPanel');

        document
            .getElementById('togglePanel')
            .onclick = () => {

                panel.classList.add('active');

            };

        document
            .getElementById('closePanel')
            .onclick = () => {

                panel.classList.remove('active');

            };
    </script>

</body>

</html>
