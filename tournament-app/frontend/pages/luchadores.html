<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Luchadores — Budokai System</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            background: #000;
            color: white;
        }
        /* VIDEO FONDO */
        
        .video-bg {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }
        
        .video-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient( 90deg, rgba(0, 0, 0, .88) 0%, rgba(0, 0, 0, .55) 45%, rgba(0, 0, 0, .25) 100%);
            z-index: -1;
        }
        /* LAYOUT */
        
        .layout {
            width: 100%;
            height: 100vh;
            display: flex;
        }
        /* CONTENIDO */
        
        .inventory-section {
            flex: 1;
            padding: 40px;
            overflow: auto;
        }
        
        .inventory-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
        }
        
        .inventory-title {
            font-size: 52px;
            font-weight: 900;
            letter-spacing: .05em;
            text-transform: uppercase;
            color: white;
            text-shadow: 0 0 24px rgba(0, 229, 255, .22);
        }
        
        .inventory-sub {
            margin-top: 10px;
            font-size: 14px;
            color: rgba(255, 255, 255, .72);
        }
        /* BOTONES */
        
        .top-actions {
            display: flex;
            gap: 16px;
        }
        
        .create-btn,
        .panel-btn {
            height: 58px;
            padding: 0 28px;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            font-weight: 900;
            letter-spacing: .10em;
            text-transform: uppercase;
        }
        
        .create-btn {
            color: #001018;
            background: linear-gradient( 90deg, #00E5FF, #00B8FF);
            box-shadow: 0 0 24px rgba(0, 229, 255, .25);
        }
        
        .panel-btn {
            color: white;
            background: rgba(255, 255, 255, .08);
            border: 1px solid rgba(255, 255, 255, .08);
        }
        /* GRID */
        
        .fighter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }
        /* CARD */
        
        .fighter-card {
            border-radius: 26px;
            overflow: hidden;
            background: linear-gradient( 180deg, rgba(10, 18, 42, .88), rgba(4, 8, 24, .94));
            border: 1px solid rgba(255, 255, 255, .08);
            backdrop-filter: blur(18px);
            transition: .22s ease;
        }
        
        .fighter-card:hover {
            transform: translateY(-6px);
            border-color: rgba(0, 229, 255, .25);
            box-shadow: 0 0 28px rgba(0, 229, 255, .12);
        }
        
        .fighter-banner {
            height: 160px;
            background: linear-gradient( 135deg, #00E5FF, #0048ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 72px;
        }
        
        .fighter-content {
            padding: 22px;
        }
        
        .fighter-name {
            font-size: 22px;
            font-weight: 900;
            margin-bottom: 8px;
        }
        
        .fighter-style {
            color: #00E5FF;
            font-size: 11px;
            letter-spacing: .10em;
            text-transform: uppercase;
            margin-bottom: 18px;
        }
        
        .fighter-info {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, .05);
            padding-bottom: 10px;
        }
        
        .info-label {
            font-size: 11px;
            color: rgba(255, 255, 255, .48);
            letter-spacing: .08em;
            text-transform: uppercase;
        }
        
        .info-value {
            font-size: 12px;
        }
        /* PANEL DERECHO */
        
        .side-panel {
            width: 360px;
            height: 100vh;
            background: linear-gradient( 180deg, rgba(8, 15, 35, .96), rgba(3, 8, 22, .98));
            border-left: 1px solid rgba(0, 229, 255, .18);
            backdrop-filter: blur(18px);
            padding: 30px 24px;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            right: 0;
            z-index: 50;
            transform: translateX(110%);
            transition: .35s ease;
        }
        
        .side-panel.active {
            transform: translateX(0);
        }
        /* TITULOS */
        
        .panel-title {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: white;
            margin-bottom: 8px;
        }
        
        .panel-sub {
            font-size: 11px;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: #00E5FF;
            margin-bottom: 30px;
        }
        /* MENU */
        
        .panel-menu {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        
        .menu-btn {
            width: 100%;
            height: 58px;
            border: none;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 0 18px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: white;
            background: linear-gradient( 90deg, rgba(12, 20, 45, .95), rgba(20, 32, 68, .92));
            border: 1px solid rgba(255, 255, 255, .05);
            transition: .22s ease;
        }
        
        .menu-btn:hover {
            transform: translateX(-4px);
            border-color: rgba(0, 229, 255, .25);
            box-shadow: 0 0 18px rgba(0, 229, 255, .14);
        }
        
        .menu-btn.active {
            background: linear-gradient( 90deg, #00E5FF, #00B8FF);
            color: #001018;
        }
        
        .menu-icon {
            font-size: 22px;
        }
        /* CERRAR PANEL */
        
        .close-panel-btn {
            margin-top: auto;
            height: 56px;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            font-weight: 900;
            letter-spacing: .10em;
            text-transform: uppercase;
            color: white;
            background: linear-gradient( 90deg, #ff3b30, #ff6b45);
        }
        /* MODAL */
        
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .82);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-box {
            width: 520px;
            max-width: 94vw;
            border-radius: 28px;
            background: linear-gradient( 180deg, rgba(8, 15, 35, .96), rgba(3, 8, 22, .98));
            border: 1px solid rgba(0, 229, 255, .18);
            padding: 32px;
        }
        
        .modal-title {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: .08em;
            text-transform: uppercase;
            margin-bottom: 26px;
        }
        /* FORM */
        
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .form-group.full {
            grid-column: 1/3;
        }
        
        label {
            font-size: 10px;
            letter-spacing: .10em;
            text-transform: uppercase;
            color: #00E5FF;
        }
        
        input,
        select {
            width: 100%;
            height: 50px;
            border: none;
            outline: none;
            border-radius: 14px;
            padding: 0 16px;
            font-family: inherit;
            background: rgba(255, 255, 255, .06);
            border: 1px solid rgba(255, 255, 255, .06);
            color: white;
        }
        
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 14px;
            margin-top: 26px;
        }
        
        .cancel-btn,
        .save-btn {
            height: 52px;
            padding: 0 28px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 900;
            letter-spacing: .10em;
            text-transform: uppercase;
        }
        
        .cancel-btn {
            background: rgba(255, 255, 255, .08);
            color: white;
        }
        
        .save-btn {
            color: #001018;
            background: linear-gradient( 90deg, #00E5FF, #00B8FF);
        }
    </style>

</head>

<body>

    <!-- VIDEO -->

    <video class="video-bg" autoplay muted loop playsinline>

    <source
    src="../assets/bg/luchadores.mp4"
    type="video/mp4">

</video>

    <div class="video-overlay"></div>

    <div class="layout">

        <!-- CONTENIDO -->

        <section class="inventory-section">

            <div class="inventory-header">

                <div>

                    <h1 class="inventory-title">
                        LUCHADORES
                    </h1>

                    <div class="inventory-sub">
                        Gestión completa de participantes del torneo
                    </div>

                </div>

                <div class="top-actions">

                    <button class="panel-btn" id="togglePanel">

                    ☰ PANEL LUCHADORES

                </button>

                    <button class="create-btn" id="openModal">

                    + Crear Luchador

                </button>

                </div>

            </div>

            <!-- GRID -->

            <div class="fighter-grid" id="fighterGrid">

                <div class="fighter-card">

                    <div class="fighter-banner">
                        🥋
                    </div>

                    <div class="fighter-content">

                        <div class="fighter-name">
                            Goku
                        </div>

                        <div class="fighter-style">
                            Artes Marciales
                        </div>

                        <div class="fighter-info">

                            <div class="info-row">

                                <span class="info-label">
                                Categoría
                            </span>

                                <span class="info-value">
                                Elite
                            </span>

                            </div>

                            <div class="info-row">

                                <span class="info-label">
                                Estado
                            </span>

                                <span class="info-value">
                                Activo
                            </span>

                            </div>

                            <div class="info-row">

                                <span class="info-label">
                                ID
                            </span>

                                <span class="info-value">
                                #001
                            </span>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </section>

        <!-- PANEL -->

        <aside class="side-panel" id="fightersPanel">

            <div class="panel-title">
                LUCHADORES
            </div>

            <div class="panel-sub">
                Budokai Tournament System
            </div>

            <div class="panel-menu">

                <button class="menu-btn" onclick="window.location.href='index.html'">

                <span class="menu-icon">🏠</span>
                Inicio

            </button>

                <button class="menu-btn" onclick="window.location.href='staff.html'">

                <span class="menu-icon">👥</span>
                Staff

            </button>

                <button class="menu-btn active">

                <span class="menu-icon">⚔️</span>
                Luchadores

            </button>

                <button class="menu-btn">
                <span class="menu-icon">➕</span>
                Crear Luchador
            </button>

                <button class="menu-btn">
                <span class="menu-icon">🥋</span>
                Categorías
            </button>

                <button class="menu-btn">
                <span class="menu-icon">🏆</span>
                Ranking
            </button>

                <button class="menu-btn">
                <span class="menu-icon">📊</span>
                Estadísticas
            </button>

            </div>

            <button class="close-panel-btn" id="closePanel">

            ✕ Cerrar Panel

        </button>

        </aside>

    </div>

    <!-- MODAL -->

    <div class="modal" id="fighterModal">

        <div class="modal-box">

            <div class="modal-title">
                Crear Luchador
            </div>

            <div class="form-grid">

                <div class="form-group">

                    <label>
                    Nombre
                </label>

                    <input type="text" id="fighterName" placeholder="Nombre">

                </div>

                <div class="form-group">

                    <label>
                    Categoría
                </label>

                    <select id="fighterCategory">

                    <option>
                        Elite
                    </option>

                    <option>
                        Amateur
                    </option>

                    <option>
                        Profesional
                    </option>

                </select>

                </div>

                <div class="form-group full">

                    <label>
                    Estilo de combate
                </label>

                    <input type="text" id="fighterStyle" placeholder="Karate, MMA, Taekwondo...">

                </div>

            </div>

            <div class="modal-actions">

                <button class="cancel-btn" id="closeModal">

                Cancelar

            </button>

                <button class="save-btn" id="saveFighter">

                Guardar

            </button>

            </div>

        </div>

    </div>

    <script>
        /* PANEL */

        const panel =
            document.getElementById('fightersPanel');

        document
            .getElementById('togglePanel')
            .onclick = () => {

                panel.classList.add('active');

            };

        document
            .getElementById('closePanel')
            .onclick = () => {

                panel.classList.remove('active');

            };

        /* MODAL */

        const modal =
            document.getElementById('fighterModal');

        document
            .getElementById('openModal')
            .onclick = () => {

                modal.classList.add('active');

            };

        document
            .getElementById('closeModal')
            .onclick = () => {

                modal.classList.remove('active');

            };

        window.onclick = (e) => {

            if (e.target === modal) {

                modal.classList.remove('active');

            }

        };

        /* CREAR LUCHADOR */

        document
            .getElementById('saveFighter')
            .onclick = () => {

                const nombre =
                    document.getElementById('fighterName').value;

                const categoria =
                    document.getElementById('fighterCategory').value;

                const estilo =
                    document.getElementById('fighterStyle').value;

                if (!nombre || !estilo) {

                    alert('Completa todos los campos');

                    return;
                }

                const card =
                    document.createElement('div');

                card.className =
                    'fighter-card';

                card.innerHTML = `

        <div class="fighter-banner">
            🥋
        </div>

        <div class="fighter-content">

            <div class="fighter-name">
                ${nombre}
            </div>

            <div class="fighter-style">
                ${estilo}
            </div>

            <div class="fighter-info">

                <div class="info-row">

                    <span class="info-label">
                        Categoría
                    </span>

                    <span class="info-value">
                        ${categoria}
                    </span>

                </div>

                <div class="info-row">

                    <span class="info-label">
                        Estado
                    </span>

                    <span class="info-value">
                        Activo
                    </span>

                </div>

                <div class="info-row">

                    <span class="info-label">
                        ID
                    </span>

                    <span class="info-value">
                        #00${Math.floor(Math.random()*99)}
                    </span>

                </div>

            </div>

        </div>

    `;

                document
                    .getElementById('fighterGrid')
                    .appendChild(card);

                modal.classList.remove('active');

            };
    </script>

</body>

</html>
